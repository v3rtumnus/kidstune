server.port=8080

spring.application.name=kidstune-backend
spring.main.web-application-type=reactive

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.globally_quoted_identifiers=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.show-sql=false

spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml
spring.liquibase.enabled=true

# Datasource is environment-specific:
#   local:  defined in application-local.properties
#   prod:   provided as SPRING_DATASOURCE_URL/USERNAME/PASSWORD env vars (auto-bound by Spring Boot)
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# Spotify OAuth – values provided per environment
spotify.client-id=${SPOTIFY_CLIENT_ID}
spotify.client-secret=${SPOTIFY_CLIENT_SECRET}
spotify.redirect-uri=${KIDSTUNE_BASE_URL}/api/v1/auth/spotify/callback
spotify.web-redirect-uri=${KIDSTUNE_BASE_URL}/web/auth/callback

# KidsTune application settings
kidstune.base-url=${KIDSTUNE_BASE_URL:https://kidstune.altenburger.io}
kidstune.jwt-secret=${KIDSTUNE_JWT_SECRET}

# Known children's artists list (age ranges used by import heuristic and classifier)
spring.config.import=classpath:known-artists.yml

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Always show Liquibase migration output regardless of root log level
logging.level.liquibase=INFO
