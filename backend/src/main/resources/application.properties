server.port=8080

spring.application.name=kidstune-backend
spring.main.web-application-type=reactive

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.globally_quoted_identifiers=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.show-sql=false

spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml
spring.liquibase.enabled=true

# Datasource is environment-specific:
#   local:  defined in application-local.properties
#   prod:   provided as SPRING_DATASOURCE_URL/USERNAME/PASSWORD env vars (auto-bound by Spring Boot)
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# Spotify OAuth – values provided per environment
spotify.client-id=${SPOTIFY_CLIENT_ID}
spotify.client-secret=${SPOTIFY_CLIENT_SECRET}
spotify.redirect-uri=${kidstune.base-url}/api/v1/auth/spotify/callback
spotify.web-redirect-uri=${kidstune.base-url}/web/settings/spotify-callback
spotify.profile-redirect-uri=${kidstune.base-url}/web/profiles/spotify-callback

# KidsTune application settings
kidstune.base-url=${KIDSTUNE_BASE_URL:https://kidstune.altenburger.io}
kidstune.jwt-secret=${KIDSTUNE_JWT_SECRET}

# VAPID keys for Web Push – generate once and persist as env vars.
# If absent a new ephemeral pair is generated on every startup (keys will be logged).
# Generate with: openssl ecparam -name prime256v1 -genkey | openssl pkcs8 -topk8 ...
# or let the app generate them on first start and copy from the logs.
kidstune.vapid.public-key=${KIDSTUNE_VAPID_PUBLIC_KEY:}
kidstune.vapid.private-key=${KIDSTUNE_VAPID_PRIVATE_KEY:}


management.endpoints.web.exposure.include=info,spotify,sse,contentResolver

# Listening Insights
insights.poller.enabled=true
insights.poller.interval-ms=180000
insights.session.gap-minutes=10
insights.live.cache-seconds=20

# Plain-text console logging with timestamp, level, logger, and message on separate lines
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %5p [%15.15t] %-40.40logger{39} : %m%n%ex

# Always show Liquibase migration output regardless of root log level
logging.level.liquibase=INFO
