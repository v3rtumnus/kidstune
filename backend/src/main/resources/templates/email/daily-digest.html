<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Musikw&#252;nsche warten</title>
</head>
<body style="margin:0;padding:0;background:#f8f9fa;font-family:Arial,Helvetica,sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" style="background:#f8f9fa;padding:32px 16px;">
  <tr>
    <td align="center">
      <table width="560" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.08);">

        <!-- Header -->
        <tr>
          <td style="background:#6f42c1;padding:28px 32px;">
            <p style="margin:0;font-size:22px;font-weight:bold;color:#ffffff;">&#127925; KidsTune</p>
          </td>
        </tr>

        <!-- Body -->
        <tr>
          <td style="padding:32px;">
            <p style="margin:0 0 24px;font-size:18px;">
              Du hast
              <strong th:text="${count}"></strong>
              offene Musikwunsch<span th:text="${count == 1 ? '' : 'wünsche'}"></span>:
            </p>

            <!-- One row per request -->
            <table th:each="entry : ${entries}" cellpadding="0" cellspacing="0"
                   style="background:#f8f9fa;border-radius:8px;margin-bottom:12px;padding:14px;width:100%;">
              <tr>
                <td style="width:52px;vertical-align:middle;">
                  <img th:if="${entry.request().imageUrl != null}" th:src="${entry.request().imageUrl}"
                       alt="" width="44" height="44"
                       style="border-radius:6px;object-fit:cover;display:block;">
                  <div th:unless="${entry.request().imageUrl != null}"
                       style="width:44px;height:44px;border-radius:6px;background:#dee2e6;font-size:1.3rem;text-align:center;line-height:44px;">&#9835;</div>
                </td>
                <td style="vertical-align:middle;padding-left:14px;">
                  <p style="margin:0 0 2px;font-size:15px;font-weight:600;"
                     th:text="${entry.request().title}"></p>
                  <p style="margin:0;color:#6c757d;font-size:13px;">
                    <span th:text="${entry.emoji}"></span>
                    <span th:text="${entry.childName()}"></span>
                  </p>
                </td>
                <td style="vertical-align:middle;text-align:right;white-space:nowrap;padding-left:12px;">
                  <a th:href="${entry.approveUrl}"
                     style="display:inline-block;background:#198754;color:#ffffff;text-decoration:none;padding:8px 18px;border-radius:6px;font-size:13px;font-weight:600;">
                    &#10003; Ja
                  </a>
                </td>
              </tr>
            </table>

            <p style="text-align:center;margin-top:24px;">
              <a th:href="${dashboardUrl}"
                 style="color:#6f42c1;font-size:14px;">Alle Anfragen im Dashboard verwalten</a>
            </p>
          </td>
        </tr>

        <!-- Footer -->
        <tr>
          <td style="padding:20px 32px;border-top:1px solid #dee2e6;">
            <p style="margin:0;color:#adb5bd;font-size:12px;">
              Du erh&#228;ltst diese E-Mail, weil du als Elternteil in KidsTune eingetragen bist.
            </p>
          </td>
        </tr>

      </table>
    </td>
  </tr>
</table>
</body>
</html>
