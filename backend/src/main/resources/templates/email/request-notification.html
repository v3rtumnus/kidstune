<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Musikwunsch</title>
</head>
<body style="margin:0;padding:0;background:#f8f9fa;font-family:Arial,Helvetica,sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" style="background:#f8f9fa;padding:32px 16px;">
  <tr>
    <td align="center">
      <table width="560" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.08);">

        <!-- Header -->
        <tr>
          <td style="background:#6f42c1;padding:28px 32px;">
            <p style="margin:0;font-size:22px;font-weight:bold;color:#ffffff;">&#127925; KidsTune</p>
          </td>
        </tr>

        <!-- Body -->
        <tr>
          <td style="padding:32px;">

            <!-- Child avatar + name -->
            <p style="margin:0 0 20px;">
              <span th:style="'display:inline-block;width:40px;height:40px;line-height:40px;border-radius:50%;text-align:center;font-size:1.3rem;background:' + ${childColor} + ';'"
                    th:text="${childEmoji}"></span>
              <span style="font-size:18px;font-weight:600;vertical-align:middle;margin-left:10px;"
                    th:text="${childName}"></span>
              <span style="font-size:18px;vertical-align:middle;"> hat einen Musikwunsch:</span>
            </p>

            <!-- Content card -->
            <table cellpadding="0" cellspacing="0" style="background:#f8f9fa;border-radius:8px;padding:16px;margin-bottom:28px;width:100%;">
              <tr>
                <td style="width:72px;vertical-align:top;">
                  <img th:if="${imageUrl != null}" th:src="${imageUrl}"
                       alt="" width="64" height="64"
                       style="border-radius:6px;object-fit:cover;display:block;">
                  <div th:unless="${imageUrl != null}"
                       style="width:64px;height:64px;border-radius:6px;background:#dee2e6;display:flex;align-items:center;justify-content:center;font-size:1.6rem;">&#9835;</div>
                </td>
                <td style="vertical-align:top;padding-left:16px;">
                  <p style="margin:0 0 4px;font-size:17px;font-weight:600;" th:text="${title}"></p>
                  <p style="margin:0;color:#6c757d;font-size:14px;" th:text="${artistName}"></p>
                </td>
              </tr>
            </table>

            <!-- Approve button -->
            <p style="text-align:center;margin-bottom:16px;">
              <a th:href="${approveUrl}"
                 style="display:inline-block;background:#198754;color:#ffffff;text-decoration:none;padding:14px 36px;border-radius:8px;font-size:16px;font-weight:600;">
                &#10003; Genehmigen
              </a>
            </p>

            <!-- Dashboard link -->
            <p style="text-align:center;margin:0;">
              <a th:href="${dashboardUrl}"
                 style="color:#6f42c1;font-size:14px;">Im Dashboard &#246;ffnen</a>
            </p>

          </td>
        </tr>

        <!-- Footer -->
        <tr>
          <td style="padding:20px 32px;border-top:1px solid #dee2e6;">
            <p style="margin:0;color:#adb5bd;font-size:12px;">
              Du erh&#228;ltst diese E-Mail, weil du als Elternteil in KidsTune eingetragen bist.
            </p>
          </td>
        </tr>

      </table>
    </td>
  </tr>
</table>
</body>
</html>
