<!DOCTYPE html>
<html lang="de"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{web/layout}">
<head>
    <title>Anfragen</title>
</head>
<body>
<th:block layout:fragment="content">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 mb-0">
            Anfragen
            <span th:if="${pendingCount > 0}"
                  class="badge bg-danger ms-2 fs-6" th:text="${pendingCount}"></span>
        </h1>
    </div>

    <!-- Tab navigation -->
    <ul class="nav nav-tabs mb-0" id="requestTabs" role="tablist">
        <li class="nav-item" role="presentation">
            <button class="nav-link active" id="pending-tab"
                    data-bs-toggle="tab" data-bs-target="#tab-pending" type="button"
                    hx-get="/web/requests/pending"
                    hx-target="#tab-pending"
                    hx-trigger="click once">
                Offen
                <span th:if="${pendingCount > 0}"
                      class="badge bg-danger ms-1" th:text="${pendingCount}"></span>
            </button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="approved-tab"
                    data-bs-toggle="tab" data-bs-target="#tab-history" type="button"
                    hx-get="/web/requests/history?tab=APPROVED"
                    hx-target="#tab-history"
                    hx-trigger="click once">
                Genehmigt
            </button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="rejected-tab"
                    data-bs-toggle="tab" data-bs-target="#tab-history" type="button"
                    hx-get="/web/requests/history?tab=REJECTED"
                    hx-target="#tab-history"
                    hx-trigger="click once">
                Abgelehnt
            </button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="expired-tab"
                    data-bs-toggle="tab" data-bs-target="#tab-history" type="button"
                    hx-get="/web/requests/history?tab=EXPIRED"
                    hx-target="#tab-history"
                    hx-trigger="click once">
                Abgelaufen
            </button>
        </li>
    </ul>

    <div class="tab-content border border-top-0 rounded-bottom p-4 bg-white">
        <div class="tab-pane fade show active" id="tab-pending"
             hx-get="/web/requests/pending"
             hx-trigger="load"
             hx-swap="innerHTML">
            <div class="text-center py-4 text-muted">
                <span class="spinner-border spinner-border-sm me-2"></span> Lade...
            </div>
        </div>
        <div class="tab-pane fade" id="tab-history"></div>
    </div>

    <!-- Bulk-approve form -->
    <form th:action="@{/web/requests/bulk-approve}" method="post" id="bulk-form" class="mt-3 d-none">
        <div id="bulk-ids"></div>
        <button type="submit" class="btn btn-success">Ausgew&auml;hlte genehmigen</button>
    </form>

</th:block>
<th:block layout:fragment="scripts">
<script>
// Bulk approve: collect checked checkboxes and submit
document.addEventListener('change', function(e) {
    if (e.target.classList.contains('bulk-check')) {
        const form   = document.getElementById('bulk-form');
        const container = document.getElementById('bulk-ids');
        container.innerHTML = '';
        document.querySelectorAll('.bulk-check:checked').forEach(cb => {
            const input = document.createElement('input');
            input.type = 'hidden';
            input.name = 'requestIds';
            input.value = cb.value;
            container.appendChild(input);
        });
        const anyChecked = document.querySelectorAll('.bulk-check:checked').length > 0;
        form.classList.toggle('d-none', !anyChecked);
    }
});
</script>
</th:block>
</body>
</html>
