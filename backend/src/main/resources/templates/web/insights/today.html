<!DOCTYPE html>
<html lang="de"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{web/layout}">
<head>
    <title>Statistik</title>
    <style>
        .timeline-container { position: relative; height: 32px; background: #e9ecef;
                               border-radius: 4px; overflow: hidden; }
        .timeline-block { position: absolute; top: 0; height: 100%; border-radius: 2px;
                          cursor: pointer; opacity: .85; }
        .timeline-block:hover { opacity: 1; }
        .kind-MUSIC     { background: #0d6efd; }
        .kind-AUDIOBOOK { background: #198754; }
        .kind-MIXED     { background: #6f42c1; }
        .stat-pill { font-size: .8rem; padding: .2rem .6rem; border-radius: 99px; }
        .now-playing-badge { font-size: .75rem; }
    </style>
</head>
<body>
<th:block layout:fragment="content">

<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="mb-0">Statistik – Heute</h2>
    <a th:href="@{/web/insights}" class="btn btn-sm btn-outline-secondary">Aktualisieren</a>
</div>

<div th:if="${#lists.isEmpty(profiles)}" class="alert alert-info">
    Noch keine Profile angelegt.
</div>

<!-- One card per profile, auto-refreshed every 60 s via HTMX -->
<div th:each="profile : ${profiles}" class="card mb-4">
    <div class="card-header d-flex align-items-center gap-2">
        <span class="fw-semibold" th:text="${profile.name}">Name</span>
        <span th:if="${profile.insightsStatus == 'TOKEN_EXPIRED'}"
              class="badge bg-warning text-dark ms-auto">
            Spotify getrennt &mdash;
            <a th:href="@{'/web/profiles/' + ${profile.id}}" class="text-dark">Neu verbinden</a>
        </span>
        <!-- Now-playing badge polled every 30 s while tab is visible -->
        <span class="ms-auto now-playing-badge"
              th:id="'np-' + ${profile.id}"
              th:hx-get="@{'/web/insights/profiles/' + ${profile.id} + '/fragments/now-playing'}"
              hx-trigger="every 30s[document.visibilityState=='visible']"
              hx-swap="outerHTML"></span>
    </div>

    <!-- Timeline strip loads immediately and refreshes every 60 s -->
    <div class="card-body"
         th:id="'card-' + ${profile.id}"
         th:hx-get="@{'/web/insights/profiles/' + ${profile.id} + '/fragments/today-card?tz=' + ${tz}}"
         hx-trigger="load, every 60s[document.visibilityState=='visible']"
         hx-swap="innerHTML">

        <div class="placeholder-glow">
            <div class="placeholder col-12" style="height:32px;border-radius:4px;"></div>
            <div class="placeholder col-4 mt-2"></div>
        </div>
    </div>

    <div class="card-footer text-muted small d-flex gap-3">
        <a th:href="@{'/web/insights/profiles/' + ${profile.id} + '/day?tz=' + ${tz}}">
            Tagesansicht
        </a>
        <a th:href="@{'/web/insights/profiles/' + ${profile.id} + '/range?tz=' + ${tz}}">
            Verlauf
        </a>
    </div>
</div>

</th:block>

<th:block layout:fragment="scripts">
<script th:src="@{/webjars/htmx.org/dist/htmx.min.js}"></script>
</th:block>
</body>
</html>
