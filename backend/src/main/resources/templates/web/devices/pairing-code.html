<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<!--
  HTMX partial: returned by POST /web/devices/pair.
  Rendered into #pairing-code-area on the devices page.
-->
<div th:fragment="pairingCode" class="card border-primary shadow-sm mt-4" style="max-width:420px">
    <div class="card-body text-center py-4">
        <h5 class="card-title mb-1">Gerät koppeln</h5>
        <p class="text-muted small mb-3">
            Öffne die KidsTune-App auf dem Gerät und gib diesen Code ein.
            Der Code ist <strong>5 Minuten</strong> gültig.
        </p>

        <div class="display-4 fw-bold letter-spacing-wide font-monospace text-primary mb-3"
             th:text="${pairingCode}">000000</div>

        <div class="d-flex align-items-center justify-content-center gap-2 text-muted small">
            <span>Läuft ab in</span>
            <span id="pairing-countdown" class="fw-medium">5:00</span>
        </div>
    </div>
</div>

<script th:inline="javascript">
    (function () {
        var expiresAt = /*[[${expiresAt}]]*/ 0;
        var el = document.getElementById('pairing-countdown');
        if (!el || !expiresAt) return;

        function tick() {
            var remaining = Math.max(0, Math.floor((expiresAt - Date.now()) / 1000));
            var m = Math.floor(remaining / 60);
            var s = remaining % 60;
            el.textContent = m + ':' + (s < 10 ? '0' : '') + s;
            if (remaining === 0) {
                el.closest('.card').innerHTML =
                    '<div class="card-body text-center py-4 text-muted">' +
                    '<p class="mb-2">Der Code ist abgelaufen.</p>' +
                    '<button class="btn btn-outline-primary btn-sm" ' +
                    'hx-post="/web/devices/pair" hx-target="#pairing-code-area" hx-swap="innerHTML">' +
                    'Neuen Code generieren</button></div>';
            } else {
                setTimeout(tick, 1000);
            }
        }
        tick();
    })();
</script>
</body>
</html>
