<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<body>

<!--/*
  Fragment: web/fragments/pending-requests :: requests
  Returned by GET /web/requests/pending via HTMX.
*/-->
<th:block th:fragment="requests">

    <div th:if="${requests.isEmpty()}" class="text-muted text-center py-4">
        Keine offenen Anfragen.
    </div>

    <div th:unless="${requests.isEmpty()}">
        <div th:each="item : ${requests}"
             th:id="|request-${item.request().id}|"
             class="card border-0 shadow-sm mb-3">
            <div class="card-body">
                <div class="d-flex gap-3 align-items-start">

                    <!-- Content image -->
                    <img th:if="${item.request().imageUrl != null}"
                         th:src="${item.request().imageUrl}"
                         alt="" width="64" height="64"
                         class="rounded flex-shrink-0"
                         style="object-fit:cover">
                    <div class="rounded bg-secondary flex-shrink-0 d-flex align-items-center justify-content-center text-white"
                         th:unless="${item.request().imageUrl != null}"
                         style="width:64px;height:64px;font-size:1.5rem">&#9835;</div>

                    <div class="flex-grow-1 min-width-0">
                        <!-- Child avatar + name -->
                        <div class="d-flex align-items-center gap-2 mb-1">
                            <span class="rounded-circle d-inline-flex align-items-center justify-content-center"
                                  th:style="|width:28px;height:28px;font-size:.9rem;background-color:${item.cssColor()}|"
                                  th:text="${item.emoji()}"></span>
                            <span class="fw-semibold"
                                  th:text="${item.profile() != null ? item.profile().name : 'Unbekannt'}"></span>
                            <small class="text-muted"
                                   th:text="${item.request().requestedAt}"></small>
                        </div>

                        <!-- Content info -->
                        <div class="fw-semibold text-truncate" th:text="${item.request().title}"></div>
                        <div class="text-muted small" th:text="${item.request().artistName}"></div>
                    </div>
                </div>

                <!-- Action buttons -->
                <div class="mt-3 d-flex gap-2 flex-wrap">
                    <!-- Bulk checkbox -->
                    <input class="form-check-input bulk-check me-1" type="checkbox"
                           th:value="${item.request().id}">

                    <!-- Approve for this child -->
                    <button class="btn btn-sm btn-success"
                            th:attr="hx-post=@{/web/requests/{id}/approve(id=${item.request().id})},hx-target=|#request-${item.request().id}|"
                            hx-swap="outerHTML">
                        &#10003; Genehmigen
                    </button>

                    <!-- Approve for all siblings -->
                    <button th:if="${hasSiblings}" class="btn btn-sm btn-outline-success"
                            th:attr="hx-post=@{/web/requests/{id}/approve-all(id=${item.request().id})},hx-target=|#request-${item.request().id}|"
                            hx-swap="outerHTML">
                        &#10003; F&uuml;r alle Kinder
                    </button>

                    <!-- Reject toggle -->
                    <button class="btn btn-sm btn-outline-danger" type="button"
                            th:attr="data-target=|reject-form-${item.request().id}|"
                            onclick="document.getElementById(this.getAttribute('data-target')).classList.toggle('d-none')">
                        &#10007; Ablehnen
                    </button>
                </div>

                <!-- Reject form (hidden by default) -->
                <div th:id="|reject-form-${item.request().id}|" class="mt-2 d-none">
                    <form class="d-flex gap-2"
                          th:attr="hx-post=@{/web/requests/{id}/reject(id=${item.request().id})},hx-target=|#request-${item.request().id}|"
                          hx-swap="outerHTML">
                        <input type="text" name="note" class="form-control form-control-sm"
                               placeholder="Optionale Notiz...">
                        <button type="submit" class="btn btn-sm btn-danger flex-shrink-0">
                            Ablehnen
                        </button>
                    </form>
                </div>

            </div>
        </div>
    </div>

</th:block>

<!--/*
  Fragment: web/fragments/pending-requests :: history
  Returned by GET /web/requests/history via HTMX.
*/-->
<th:block th:fragment="history">

    <div th:if="${requests.isEmpty()}" class="text-muted text-center py-4">
        Keine Eintr&auml;ge vorhanden.
    </div>

    <div th:unless="${requests.isEmpty()}">
        <div th:each="item : ${requests}" class="card border-0 shadow-sm mb-2">
            <div class="card-body py-2">
                <div class="d-flex gap-3 align-items-center">
                    <img th:if="${item.request().imageUrl != null}"
                         th:src="${item.request().imageUrl}"
                         alt="" width="40" height="40"
                         class="rounded flex-shrink-0"
                         style="object-fit:cover">
                    <div class="flex-grow-1 min-width-0">
                        <div class="d-flex align-items-center gap-2">
                            <span class="rounded-circle d-inline-flex align-items-center justify-content-center"
                                  th:style="|width:24px;height:24px;font-size:.8rem;background-color:${item.cssColor()}|"
                                  th:text="${item.emoji()}"></span>
                            <span class="fw-semibold small"
                                  th:text="${item.profile() != null ? item.profile().name : ''}"></span>
                        </div>
                        <div class="text-truncate small" th:text="${item.request().title}"></div>
                    </div>
                    <div class="text-end flex-shrink-0">
                        <span class="badge"
                              th:classappend="${item.request().status.name() == 'APPROVED'} ? 'bg-success' : (${item.request().status.name() == 'REJECTED'} ? 'bg-danger' : 'bg-secondary')"
                              th:text="${item.request().status}"></span>
                        <div class="text-muted small mt-1"
                             th:if="${item.request().resolvedAt != null}"
                             th:text="${item.request().resolvedAt}"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</th:block>

</body>
</html>
