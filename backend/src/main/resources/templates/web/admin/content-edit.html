<!DOCTYPE html>
<html lang="de"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{web/layout}">
<head><title>Admin – Inhalt bearbeiten</title></head>
<body>
<th:block layout:fragment="content">

    <div class="d-flex align-items-center mb-4">
        <a th:href="@{/web/admin/content}" class="btn btn-sm btn-outline-secondary me-3">&larr;</a>
        <h1 class="h3 mb-0">Inhalt bearbeiten</h1>
    </div>

    <div class="card border-0 shadow-sm" style="max-width:500px">
        <div class="card-body">

            <div class="mb-3 p-3 bg-light rounded d-flex align-items-center gap-3">
                <img th:if="${content.imageUrl != null}"
                     th:src="${content.imageUrl}"
                     alt="" width="48" height="48" class="rounded" style="object-fit:cover">
                <div>
                    <div class="fw-medium" th:text="${content.title}"></div>
                    <div class="text-muted small" th:text="${content.artistName}"></div>
                    <div class="text-muted small font-monospace"
                         th:text="${#strings.abbreviate(content.spotifyUri, 40)}"></div>
                </div>
            </div>

            <p class="text-muted small mb-3">Profil: <strong th:text="${profileName}"></strong></p>

            <form th:action="@{/web/admin/content/{id}/edit(id=${content.id})}" method="post">

                <div class="mb-3">
                    <label class="form-label fw-medium">Inhaltstyp</label>
                    <select name="contentType" class="form-select">
                        <option th:each="ct : ${contentTypes}"
                                th:value="${ct}"
                                th:text="${ct}"
                                th:selected="${content.contentType == ct}"></option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-medium">Bereich</label>
                    <select name="scope" class="form-select">
                        <option th:each="cs : ${contentScopes}"
                                th:value="${cs}"
                                th:text="${cs}"
                                th:selected="${content.scope == cs}"></option>
                    </select>
                    <div class="form-text">Hinweis: Die Spotify-URI wird nicht geändert.</div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Speichern</button>
                    <a th:href="@{/web/admin/content}" class="btn btn-outline-secondary">Abbrechen</a>
                </div>
            </form>
        </div>
    </div>

</th:block>
</body>
</html>
