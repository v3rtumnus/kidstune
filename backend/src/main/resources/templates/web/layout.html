<!DOCTYPE html>
<html lang="de"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$CONTENT_TITLE - KidsTune">KidsTune</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
    <style>
        body { min-height: 100vh; }
        .sidebar { width: 220px; min-height: 100vh; flex-shrink: 0; }
        .sidebar .nav-link { color: rgba(255,255,255,.65); padding: .5rem 1rem; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { color: #fff; background: rgba(255,255,255,.1); border-radius: .375rem; }
        .content-wrapper { flex: 1; min-width: 0; }
        @media (max-width: 767.98px) { .sidebar { display: none !important; } }
    </style>
</head>
<body class="bg-light">

<div class="d-flex">

    <!-- Linke Seitenleiste (nur Desktop) -->
    <nav class="sidebar bg-dark d-none d-md-flex flex-column py-3 px-2">
        <a class="text-white fw-bold text-decoration-none px-3 pb-3 d-block fs-5"
           th:href="@{/web/dashboard}">KidsTune</a>

        <ul class="nav nav-pills flex-column flex-grow-1">
            <li class="nav-item">
                <a class="nav-link" th:href="@{/web/dashboard}">&Uuml;bersicht</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/web/profiles}">Profile</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/web/requests}">Anfragen
                    <span th:if="${pendingRequestCount != null and pendingRequestCount > 0}"
                          class="badge bg-danger ms-1" th:text="${pendingRequestCount}"></span>
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/web/import}">Importieren</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/web/devices}">Ger&auml;te</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/web/settings}">Einstellungen</a>
            </li>
            <li class="nav-item mt-2">
                <a class="nav-link" th:href="@{/web/admin/families}">Administration</a>
            </li>
        </ul>

        <div class="px-2 mt-3">
            <small class="text-white-50 d-block text-truncate px-2 mb-2"
                   th:if="${familyId != null}"
                   th:text="${'ID: ' + #strings.substring(familyId, 0, 8) + '...'}"></small>
            <form th:action="@{/web/logout}" method="post">
                <button type="submit" class="btn btn-outline-light btn-sm w-100">Abmelden</button>
            </form>
        </div>
    </nav>

    <!-- Hauptbereich -->
    <div class="content-wrapper">

        <!-- Mobile Navigationsleiste -->
        <nav class="navbar navbar-dark bg-dark d-md-none px-3">
            <a class="navbar-brand" th:href="@{/web/dashboard}">KidsTune</a>
            <button class="navbar-toggler" type="button"
                    data-bs-toggle="offcanvas" data-bs-target="#mobileSidebar"
                    aria-controls="mobileSidebar">
                <span class="navbar-toggler-icon"></span>
            </button>
        </nav>

        <!-- Mobile Offcanvas-Men&uuml; -->
        <div class="offcanvas offcanvas-start bg-dark text-white d-md-none"
             tabindex="-1" id="mobileSidebar">
            <div class="offcanvas-header">
                <h5 class="offcanvas-title text-white">KidsTune</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
            </div>
            <div class="offcanvas-body d-flex flex-column">
                <ul class="nav nav-pills flex-column flex-grow-1">
                    <li class="nav-item"><a class="nav-link text-white" th:href="@{/web/dashboard}">&Uuml;bersicht</a></li>
                    <li class="nav-item"><a class="nav-link text-white" th:href="@{/web/profiles}">Profile</a></li>
                    <li class="nav-item"><a class="nav-link text-white" th:href="@{/web/requests}">Anfragen</a></li>
                    <li class="nav-item"><a class="nav-link text-white" th:href="@{/web/import}">Importieren</a></li>
                    <li class="nav-item"><a class="nav-link text-white" th:href="@{/web/devices}">Ger&auml;te</a></li>
                    <li class="nav-item"><a class="nav-link text-white" th:href="@{/web/settings}">Einstellungen</a></li>
                    <li class="nav-item"><a class="nav-link text-white" th:href="@{/web/admin/families}">Administration</a></li>
                </ul>
                <form th:action="@{/web/logout}" method="post" class="mt-3">
                    <button type="submit" class="btn btn-outline-light btn-sm w-100">Abmelden</button>
                </form>
            </div>
        </div>

        <!-- Seiteninhalt -->
        <main class="p-4">
            <th:block layout:fragment="content">
                <!-- Seitenspezifischer Inhalt wird hier eingefugt -->
            </th:block>
        </main>

    </div>
</div>

<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/webjars/htmx.org/dist/htmx.min.js}"></script>
<th:block layout:fragment="scripts"></th:block>
</body>
</html>
